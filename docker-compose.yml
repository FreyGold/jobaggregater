# Docker Compose for Full Stack Testing
# 
# For DEVELOPMENT with hot reload:
#   docker-compose -f docker-compose.dev-services.yml up
#   Then: cd apps/api && npm run dev
#         cd apps/web && npm run dev
#
# For PRODUCTION-LIKE testing (rebuilds everything):
#   docker-compose up --build
#
# For running only services, running apps locally:
#   docker-compose -f docker-compose.dev-services.yml up

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: jobaggDB
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U user -d jobaggDB']
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis Cache
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

  # Job Aggregator API
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - '3001:3001'
    env_file:
      - ./apps/api/.env
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=supersecret123
      - CORS_ORIGIN=http://localhost:3000,http://localhost:8081
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js Web Application
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      target: dev
    command: sh -c "pnpm install --frozen-lockfile && pnpm --filter @jobagg/web dev"
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
      - pnpm_store:/pnpm/store
    environment:
      - NODE_ENV=development
      - PORT=3000
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true
    depends_on:
      - api

volumes:
  postgres_data:
  redis_data:
  web_node_modules:
  pnpm_store:
