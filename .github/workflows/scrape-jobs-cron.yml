name: Scrape Jobs Cron

on:
  schedule:
    # LinkedIn: Every hour at minute 0
    - cron: '0 * * * *'
    # API Jobs: Every 3 hours at minute 0
    - cron: '0 */3 * * *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build shared workspace
        run: pnpm --filter @jobagg/shared build

      - name: Scrape LinkedIn Jobs
        working-directory: ./apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: npx tsx src/jobs/runScraperCli.ts linkedin

      - name: Scrape API Jobs
        working-directory: ./apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: npx tsx src/jobs/runScraperCli.ts api

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Cron job failed',
              body: 'The scrape-jobs-cron workflow failed at ' + new Date().toISOString()
            })
