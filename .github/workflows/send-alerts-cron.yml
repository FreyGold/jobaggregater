name: Send Job Alerts Cron

on:
  schedule:
    # Runs 2 hours after the job scraping cron '0 */3 * * *'
    - cron: '0 2-23/3 * * *'
    # Runs 2 hours after the job scraping cron '0 */8 * * *'
    - cron: '0 2,10,18 * * *'
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  send-alerts:
    runs-on: ubuntu-latest
    environment: Production
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build shared workspace
        run: pnpm --filter @jobagg/shared build

      - name: Send Job Alerts
        working-directory: ./apps/api
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          REDIS_URL: ${{ secrets.REDIS_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          PORT: ${{ secrets.PORT }}
        run: npx tsx src/jobs/runAlertsCli.ts

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '❌ Alert cron failed',
              body: 'The send-alerts-cron workflow failed at ' + new Date().toISOString()
            })
