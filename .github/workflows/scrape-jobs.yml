name: Scrape Jobs
 on:
   schedule:
     - cron: '0 * * * *'          # LinkedIn: every hour
     - cron: '0 */3 * * *'        # API jobs: every 3 hours
 
 jobs:
   scrape:
     runs-on: ubuntu-latest
     steps:
       - name: Scrape LinkedIn
         run: curl -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" 
         https://jobaggregater-api.vercel.app/api/cron/scrape-linkedin
       
       - name: Scrape API Jobs
         run: curl -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" 
https://jobaggregater-api.vercel.app/api/cron/scrape-api-jobs